<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <div class="hero">
            <h1>Find Your Dream Job</h1>
            <p>Browse opportunities from top companies and take the next step in your career.</p>
        </div>
        <div id="alert"></div>
        <h2 class="page-title">Job Listings</h2>
        <div id="job-list"></div>
        <div id="pagination" class="mt-3"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let currentPage = 0;
        let totalPages = 0;
        const PAGE_SIZE = 10;

        async function loadJobs() {
            try {
                const res = await apiFetch('/jobs?page=' + currentPage + '&size=' + PAGE_SIZE);
                totalPages = res.totalPages;
                const jobs = res.content;
                const list = document.getElementById('job-list');

                if (jobs.length === 0) {
                    list.innerHTML = '<div class="card empty-state"><p>No jobs found.</p></div>';
                    renderPagination();
                    return;
                }

                list.innerHTML = jobs.map(job => `
                    <div class="card job-card">
                        <div class="job-card-top">
                            <div>
                                <h3>${job.title}</h3>
                                <div class="job-info">
                                    ${job.companyName ? '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>' + job.companyName + '</span>' : ''}
                                    ${job.location ? '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + job.location + '</span>' : ''}
                                    ${job.salaryMin ? '<span class="salary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>' + formatSalary(job.salaryMin, job.salaryMax, job.currency) + '</span>' : ''}
                                </div>
                            </div>
                            <a href="/job-detail.html?id=${job.id}" class="btn btn-primary btn-sm">View Details</a>
                        </div>
                    </div>
                `).join('');
                renderPagination();
            } catch (e) {
                showAlert(e.message);
            }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            let html = '<div class="pagination">';
            html += `<button class="btn btn-outline btn-sm" onclick="goToPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>Previous</button>`;
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline'}" onclick="goToPage(${i})">${i + 1}</button>`;
            }
            html += `<button class="btn btn-outline btn-sm" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages - 1 ? 'disabled' : ''}>Next</button>`;
            html += '</div>';
            container.innerHTML = html;
        }

        function formatSalary(min, max, currency) {
            const fmt = (v) => {
                if (v >= 1000000) return (v / 1000000).toFixed(0) + 'M';
                if (v >= 1000) return (v / 1000).toFixed(0) + 'K';
                return v;
            };
            const sym = currency === 'USD' ? '$' : (currency === 'VND' ? '₫' : '');
            if (max && max !== min) return sym + fmt(min) + ' - ' + sym + fmt(max);
            return sym + fmt(min);
        }

        function goToPage(page) {
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            loadJobs();
        }

        loadJobs();
    </script>
</body>
</html>
