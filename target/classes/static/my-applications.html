<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications - JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <h2 class="mb-2">My Applications</h2>
        <div id="alert"></div>
        <div id="apps-list"></div>
        <div id="pagination" class="mt-3"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        if (!isLoggedIn()) {
            window.location.href = '/login.html';
        }

        let currentPage = 0;
        let totalPages = 0;
        const PAGE_SIZE = 10;

        async function loadApps() {
            try {
                const res = await apiFetch('/applications/my?page=' + currentPage + '&size=' + PAGE_SIZE);
                totalPages = res.totalPages;
                const apps = res.content;
                const list = document.getElementById('apps-list');
                if (apps.length === 0) {
                    list.innerHTML = '<div class="card"><p>No applications yet.</p></div>';
                    renderPagination();
                    return;
                }
                list.innerHTML = apps.map(app => `
                    <div class="card job-card">
                        <div class="job-card-top">
                            <div>
                                <h3>${app.jobTitle || 'Job #' + app.jobId}</h3>
                                <div class="meta mt-1">Applied: ${new Date(app.appliedAt).toLocaleDateString()}</div>
                            </div>
                            <div class="flex-col" style="align-items:flex-end">
                                <span class="badge badge-${app.status.toLowerCase()}">${app.status}</span>
                                ${app.status === 'APPLIED' ? `<button onclick="withdraw(${app.id})" class="btn btn-sm btn-danger mt-1">Withdraw</button>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
                renderPagination();
            } catch (e) {
                showAlert(e.message);
            }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = '<div class="pagination">';
            html += '<button class="btn btn-outline btn-sm" onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 0 ? 'disabled' : '') + '>Previous</button>';
            for (let i = 0; i < totalPages; i++) {
                html += '<button class="btn btn-sm ' + (i === currentPage ? 'btn-primary' : 'btn-outline') + '" onclick="goToPage(' + i + ')">' + (i + 1) + '</button>';
            }
            html += '<button class="btn btn-outline btn-sm" onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages - 1 ? 'disabled' : '') + '>Next</button>';
            html += '</div>';
            container.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            loadApps();
        }

        async function withdraw(id) {
            if (!confirm('Withdraw this application?')) return;
            try {
                await apiFetch('/applications/' + id, { method: 'DELETE' });
                showAlert('Application withdrawn', 'success');
                loadApps();
            } catch (e) {
                showAlert(e.message);
            }
        }

        loadApps();
    </script>
</body>
</html>
