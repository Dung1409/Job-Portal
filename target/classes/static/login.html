<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <div class="form-card">
            <div class="card">
                <h2 class="text-center mb-2">Welcome Back</h2>
                <p class="text-center mb-2" style="color:var(--text-secondary);font-size:0.9rem">Sign in to your account</p>
                <div id="alert"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
                    <p class="text-center mt-2" style="font-size:0.88rem;color:var(--text-secondary)">
                        Don't have an account? <a href="/register.html">Create one</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                const data = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                localStorage.setItem('token', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                localStorage.setItem('user', JSON.stringify(data.user));
                const role = data.user.role;
                if (role === 'RECRUITER') window.location.href = '/my-jobs.html';
                else if (role === 'ADMIN') window.location.href = '/index.html';
                else window.location.href = '/index.html';
            } catch (e) {
                showAlert(e.message);
            }
        });
    </script>
</body>
</html>
