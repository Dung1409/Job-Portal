<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Company — JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <div id="alert"></div>
        <h2 class="page-title">🏢 My Company</h2>

        <div id="company-section">
            <div class="card" id="company-form-section">
                <h3 id="company-form-title">Create Your Company</h3>
                <form id="company-form">
                    <input type="hidden" id="companyId">
                    <div class="form-group">
                        <label>Company Name *</label>
                        <input type="text" id="name" placeholder="e.g. TechCorp Vietnam" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" rows="4" placeholder="Tell us about your company..."></textarea>
                    </div>
                    <div class="flex gap-2 flex-wrap">
                        <div class="form-group flex-1" style="min-width:200px">
                            <label>Website</label>
                            <input type="url" id="website" placeholder="https://company.com">
                        </div>
                        <div class="form-group flex-1" style="min-width:200px">
                            <label>Industry</label>
                            <input type="text" id="industry" placeholder="e.g. Technology">
                        </div>
                    </div>
                    <div class="flex gap-2 flex-wrap">
                        <div class="form-group flex-1" style="min-width:200px">
                            <label>Address</label>
                            <input type="text" id="address" placeholder="e.g. 123 Đường Láng, Hà Nội">
                        </div>
                        <div class="form-group" style="min-width:120px">
                            <label>Company Size</label>
                            <select id="companySize">
                                <option value="">Select size</option>
                                <option value="1-10">1-10</option>
                                <option value="11-50">11-50</option>
                                <option value="51-200">51-200</option>
                                <option value="201-1000">201-1000</option>
                                <option value="1000+">1000+</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg">Save Company</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        async function loadCompany() {
            try {
                const company = await apiFetch('/companies/my');
                if (company) {
                    document.getElementById('companyId').value = company.id;
                    document.getElementById('name').value = company.name || '';
                    document.getElementById('description').value = company.description || '';
                    document.getElementById('website').value = company.website || '';
                    document.getElementById('industry').value = company.industry || '';
                    document.getElementById('address').value = company.address || '';
                    document.getElementById('companySize').value = company.companySize || '';
                    document.getElementById('company-form-title').textContent = 'Edit Your Company';
                    document.querySelector('#company-form .btn-primary').textContent = 'Update Company';
                }
            } catch (e) {
                if (e.message.includes('haven\'t created')) return;
                showAlert(e.message);
            }
        }

        document.getElementById('company-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                website: document.getElementById('website').value,
                industry: document.getElementById('industry').value,
                address: document.getElementById('address').value,
                companySize: document.getElementById('companySize').value
            };
            const id = document.getElementById('companyId').value;
            try {
                if (id) {
                    await apiPut('/companies/' + id, data);
                    showToast('Company updated!', 'success');
                } else {
                    await apiPost('/companies', data);
                    showToast('Company created!', 'success');
                }
                loadCompany();
            } catch (e) { showAlert(e.message); }
        });

        loadCompany();
    </script>
</body>
</html>
