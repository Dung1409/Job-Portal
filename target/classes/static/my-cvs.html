<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CVs — JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <div id="alert"></div>
        <h2 class="page-title">📄 My CVs</h2>

        <div class="card mb-3" style="max-width:500px">
            <h3 class="mb-1">Upload New CV</h3>
            <form id="cv-form">
                <div class="form-group">
                    <input type="file" id="cvFile" accept=".pdf,.doc,.docx,application/pdf" required>
                    <span class="field-hint">PDF format, max 10MB</span>
                </div>
                <button type="submit" class="btn btn-primary">Upload CV</button>
            </form>
        </div>

        <h3 class="page-title-sm">Saved CVs</h3>
        <div id="cvs-list"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        async function loadCvs() {
            try {
                const cvs = await apiFetch('/cvs');
                const list = document.getElementById('cvs-list');

                if (!cvs || cvs.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><h3>No CVs uploaded yet</h3><p>Upload your first CV above to apply for jobs quickly.</p></div>';
                    return;
                }

                list.innerHTML = cvs.map(cv => `
                    <div class="card">
                        <div class="flex-between">
                            <div>
                                <h3>${cv.originalFilename}</h3>
                                <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.3rem">
                                    <span style="font-size:0.84rem;color:var(--text-muted)">📅 Uploaded ${formatDate(cv.uploadedAt)}</span>
                                    ${cv.fileSize ? '<span style="font-size:0.84rem;color:var(--text-muted)">📦 ' + (cv.fileSize / 1024).toFixed(0) + ' KB</span>' : ''}
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <a href="/api/v1/files/cv/${cv.id}" class="btn btn-outline btn-sm" target="_blank">Download</a>
                                <button class="btn btn-danger btn-sm" onclick="deleteCv(${cv.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { showAlert(e.message); }
        }

        async function deleteCv(id) {
            if (!confirm('Delete this CV?')) return;
            try {
                await apiDelete('/cvs/' + id);
                showToast('CV deleted', 'success');
                loadCvs();
            } catch (e) { showAlert(e.message); }
        }

        document.getElementById('cv-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const file = document.getElementById('cvFile').files[0];
            if (!file) return showAlert('Please select a file');

            const fd = new FormData();
            fd.append('file', file);
            try {
                await apiUpload('/cvs', fd);
                showToast('CV uploaded successfully!', 'success');
                document.getElementById('cvFile').value = '';
                loadCvs();
            } catch (e) { showAlert(e.message); }
        });

        loadCvs();
    </script>
</body>
</html>
