spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jobportal_test?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: rootpass

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      fail-on-empty-beans: false

app:
  jwt:
    secret: "bXktc2VjcmV0LWtleS1mb3Itam9iLXBvcnRhbC1wcm9qZWN0LTI1Ni1iaXQtbG9uZw=="
    access-token-expiry-ms: 3600000
    refresh-token-expiry-days: 7

  upload:
    dir: ./target/uploads
    max-file-size: 5MB
    allowed-types: application/pdf,image/jpeg,image/png

  cors:
    allowed-origins: http://localhost:8080
