<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Detail — JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <a href="/index.html" class="back-link">← Back to Jobs</a>
        <div id="alert"></div>
        <div id="job-detail"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        async function loadJob() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return showAlert('Job not found');

            try {
                const job = await apiFetch('/jobs/' + id);
                const user = getUser();
                const sym = job.currency === 'USD' ? '$' : (job.currency === 'VND' ? '₫' : job.currency || '');
                const salary = job.salaryMin && job.salaryMax
                    ? sym + ' ' + Number(job.salaryMin).toLocaleString() + ' - ' + sym + ' ' + Number(job.salaryMax).toLocaleString()
                    : (job.salaryMin ? sym + ' ' + Number(job.salaryMin).toLocaleString() : '');

                document.getElementById('job-detail').innerHTML = `
                    <div class="card">
                        <div class="flex-between" style="margin-bottom:1rem">
                            <div>
                                <h2>${job.title}</h2>
                                <div style="display:flex;flex-wrap:wrap;gap:0.4rem 1rem;margin-top:0.5rem">
                                    ${job.companyName ? '<span style="font-size:0.88rem;color:var(--text-secondary)">📋 ' + job.companyName + '</span>' : ''}
                                    ${job.location ? '<span style="font-size:0.88rem;color:var(--text-secondary)">📍 ' + job.location + '</span>' : ''}
                                    ${salary ? '<span style="font-size:0.88rem;font-weight:600;color:var(--success)">💰 ' + salary + '</span>' : ''}
                                </div>
                                <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.6rem">
                                    ${job.jobType ? '<span class="badge badge-primary">' + job.jobType.replace(/_/g, ' ') + '</span>' : ''}
                                    ${job.experience ? '<span class="badge badge-info">' + job.experience.replace(/_/g, ' ') + '</span>' : ''}
                                    ${job.status ? '<span class="badge badge-success">' + job.status + '</span>' : ''}
                                    ${job.categoryName ? '<span class="badge badge-warning">' + job.categoryName + '</span>' : ''}
                                </div>
                            </div>
                        </div>
                        ${job.description ? '<hr class="section-divider"><h4>📄 Description</h4><p>' + job.description + '</p>' : ''}
                        ${job.requirements ? '<hr class="section-divider"><h4>📋 Requirements</h4><p style="white-space:pre-wrap">' + job.requirements + '</p>' : ''}
                        ${job.benefits ? '<hr class="section-divider"><h4>🎁 Benefits</h4><p style="white-space:pre-wrap">' + job.benefits + '</p>' : ''}
                        ${user && user.role === 'APPLICANT' ? `
                            <hr class="section-divider">
                            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem">
                                <button class="btn btn-outline" onclick="contactRecruiter(${job.companyId})">💬 Contact Recruiter</button>
                            </div>
                            <hr class="section-divider">
                            <div id="apply-section">
                                <h4>🚀 Apply for this job</h4>
                                <form id="apply-form" enctype="multipart/form-data">
                                    <div class="form-group">
                                        <label>Cover Letter (optional)</label>
                                        <textarea id="coverLetter" rows="5" placeholder="Tell the employer why you're a good fit and what makes you unique..."></textarea>
                                    </div>
                                    <div class="form-group">
                                        <label>Resume / CV</label>
                                        <div class="radio-group">
                                            <label><input type="radio" name="cvChoice" value="upload" checked onchange="toggleCvInput()"> Upload new</label>
                                            <label><input type="radio" name="cvChoice" value="existing" onchange="toggleCvInput()"> Choose existing</label>
                                        </div>
                                        <div id="cv-upload-section">
                                            <input type="file" id="resumeFile" accept=".pdf,.doc,.docx,application/pdf">
                                            <span class="field-hint">Upload your CV (PDF, max 10MB)</span>
                                        </div>
                                        <div id="cv-existing-section" style="display:none">
                                            <select id="existingCv">
                                                <option value="">-- Select a CV --</option>
                                            </select>
                                            <span class="field-hint">Choose from your uploaded CVs</span>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-success btn-lg">Submit Application</button>
                                </form>
                            </div>
                        ` : ''}
                        ${!user ? '<hr class="section-divider"><div class="empty-state" style="padding:1.5rem"><p><a href="/login.html">Sign in</a> to apply for this job.</p></div>' : ''}
                    </div>
                `;

                if (user && user.role === 'APPLICANT') {
                    try {
                        const alreadyApplied = await apiFetch('/applications/check/' + job.id);
                        if (alreadyApplied) {
                            document.getElementById('apply-section').innerHTML = '<div class="alert alert-success" style="margin-bottom:0">✅ You have already applied for this job.</div>';
                            return;
                        }
                    } catch {}
                    try {
                        const cvs = await apiFetch('/cvs');
                        const sel = document.getElementById('existingCv');
                        if (cvs && cvs.length) {
                            cvs.forEach(cv => {
                                const opt = document.createElement('option');
                                opt.value = cv.id;
                                opt.textContent = cv.originalFilename + ' (' + formatDate(cv.uploadedAt) + ')';
                                sel.appendChild(opt);
                            });
                        }
                    } catch {}
                    document.getElementById('apply-form').addEventListener('submit', async function(e) {
                        e.preventDefault();
                        const fd = new FormData();
                        fd.append('jobId', job.id);
                        fd.append('coverLetter', document.getElementById('coverLetter').value);
                        const choice = document.querySelector('input[name="cvChoice"]:checked').value;
                        if (choice === 'upload') {
                            const file = document.getElementById('resumeFile').files[0];
                            if (!file) return showAlert('Please select a file to upload');
                            fd.append('resume', file);
                        } else {
                            const cvId = document.getElementById('existingCv').value;
                            if (!cvId) return showAlert('Please select a CV');
                            fd.append('cvId', cvId);
                        }
                        try {
                            await apiUpload('/applications', fd);
                            showToast('Application submitted successfully!', 'success');
                            document.getElementById('apply-section').innerHTML = '<div class="alert alert-success" style="margin-bottom:0">✅ Your application has been submitted successfully!</div>';
                        } catch (e) {
                            showAlert(e.message);
                        }
                    });
                }
            } catch (e) {
                showAlert(e.message);
                document.getElementById('job-detail').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Failed to load job</h3><p>' + e.message + '</p></div>';
            }
        }

        async function contactRecruiter(companyId) {
            try {
                const company = await apiFetch('/companies/' + companyId);
                window.location.href = '/conversation.html?userId=' + company.recruiterId;
            } catch (e) {
                showAlert('Could not find recruiter info');
            }
        }

        function toggleCvInput() {
            const choice = document.querySelector('input[name="cvChoice"]:checked').value;
            document.getElementById('cv-upload-section').style.display = choice === 'upload' ? 'block' : 'none';
            document.getElementById('cv-existing-section').style.display = choice === 'existing' ? 'block' : 'none';
        }

        loadJob();
    </script>
</body>
</html>
