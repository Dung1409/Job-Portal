<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <h1 class="page-title">Messages</h1>

        <div id="conversation-list"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        if (!isLoggedIn()) { window.location.href = '/login.html'; }

        async function loadConversations() {
            const container = document.getElementById('conversation-list');
            container.innerHTML = '<div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div>';

            try {
                const convos = await apiFetch('/messages/conversations');

                if (convos.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><h3>No conversations yet</h3><p>When you send or receive a message, it will appear here.</p></div>';
                    return;
                }

                container.innerHTML = convos.map(c => {
                    const time = c.lastMessageAt ? formatDate(c.lastMessageAt) : '';
                    const preview = c.lastMessage ? (c.lastMessage.length > 60 ? c.lastMessage.substring(0, 60) + '...' : c.lastMessage) : 'No messages yet';
                    return `
                    <div class="card conversation-card" onclick="window.location.href='/conversation.html?userId=${c.userId}'">
                        <div class="conversation-avatar">${c.fullName.charAt(0).toUpperCase()}</div>
                        <div class="conversation-body">
                            <div class="conversation-top">
                                <strong>${c.fullName}</strong>
                                <span class="conversation-time">${time}</span>
                            </div>
                            <div class="conversation-bottom">
                                <span class="conversation-preview ${c.unreadCount > 0 ? 'unread' : ''}">${preview}</span>
                                ${c.unreadCount > 0 ? '<span class="unread-badge">' + c.unreadCount + '</span>' : ''}
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Something went wrong</h3><p>' + e.message + '</p></div>';
            }
        }

        window.onNewMessage = function(msg) {
            loadConversations();
            updateUnreadBadge();
        };

        loadConversations();
    </script>
</body>
</html>
