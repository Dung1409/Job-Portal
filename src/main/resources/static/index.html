<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobPortal — Find Your Dream Job</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <div class="hero">
            <h1>Find Your Dream Job</h1>
            <p>Browse opportunities from top companies and take the next step in your career.</p>
        </div>

        <div id="alert"></div>

        <div class="search-bar" id="search-bar">
            <input class="search-input" type="text" id="searchKeyword" placeholder="Search by title, keyword..." oninput="onSearchChange()">
            <select id="searchLocation" onchange="onSearchChange()">
                <option value="">All Locations</option>
                <option value="Hà Nội">Hà Nội</option>
                <option value="Hồ Chí Minh">Hồ Chí Minh</option>
                <option value="Đà Nẵng">Đà Nẵng</option>
            </select>
            <select id="searchType" onchange="onSearchChange()">
                <option value="">All Types</option>
                <option value="FULL_TIME">Full Time</option>
                <option value="PART_TIME">Part Time</option>
                <option value="REMOTE">Remote</option>
                <option value="CONTRACT">Contract</option>
                <option value="INTERNSHIP">Internship</option>
            </select>
            <select id="searchExperience" onchange="onSearchChange()">
                <option value="">All Levels</option>
                <option value="NO_EXPERIENCE">No Experience</option>
                <option value="UNDER_1_YEAR">Under 1 Year</option>
                <option value="ONE_TWO_YEARS">1-2 Years</option>
                <option value="THREE_FIVE_YEARS">3-5 Years</option>
                <option value="OVER_5_YEARS">5+ Years</option>
            </select>
            <select id="searchCategory" onchange="onSearchChange()">
                <option value="">All Categories</option>
            </select>
        </div>

        <div class="flex-between mb-2">
            <h2 class="page-title" style="margin-bottom:0">Job Listings</h2>
            <span style="font-size:0.85rem;color:var(--text-muted)" id="result-count"></span>
        </div>

        <div id="job-list"></div>
        <div id="pagination" class="mt-3"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let currentPage = 0;
        let totalPages = 0;
        const PAGE_SIZE = 10;
        let searchTimeout;

        async function loadCategories() {
            try {
                const cats = await apiFetch('/categories');
                const sel = document.getElementById('searchCategory');
                cats.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.name;
                    sel.appendChild(opt);
                });
            } catch {}
        }

        function onSearchChange() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 0;
                loadJobs();
            }, 300);
        }

        function buildSearchParams() {
            const kw = document.getElementById('searchKeyword').value.trim();
            const loc = document.getElementById('searchLocation').value;
            const type = document.getElementById('searchType').value;
            const exp = document.getElementById('searchExperience').value;
            const cat = document.getElementById('searchCategory').value;
            const params = new URLSearchParams();
            params.set('page', currentPage);
            params.set('size', PAGE_SIZE);
            if (kw) params.set('keyword', kw);
            if (loc) params.set('location', loc);
            if (type) params.set('jobType', type);
            if (exp) params.set('experience', exp);
            if (cat) params.set('categoryId', cat);
            return params.toString();
        }

        async function loadJobs() {
            showSkeleton('job-list', 3);
            document.getElementById('result-count').textContent = '';

            try {
                const params = buildSearchParams();
                const res = await apiFetch('/jobs?' + params);
                totalPages = res.totalPages;
                const jobs = res.content;
                const list = document.getElementById('job-list');

                document.getElementById('result-count').textContent = res.totalElements + ' job' + (res.totalElements !== 1 ? 's' : '') + ' found';

                if (jobs.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>No jobs found</h3><p>Try adjusting your search or filter criteria.</p></div>';
                    renderPagination();
                    return;
                }

                list.innerHTML = jobs.map(job => {
                    const sym = job.currency === 'USD' ? '$' : (job.currency === 'VND' ? 'VND' : '');
                    const salaryFmt = formatSalary(job.salaryMin, job.salaryMax, job.currency);
                    return `
                    <div class="card job-card">
                        <div class="job-card-top">
                            <div>
                                <a href="/job-detail.html?id=${job.id}" style="color:var(--text);text-decoration:none"><h3>${job.title}</h3></a>
                                <div class="job-info">
                                    ${job.companyName ? '<span>📋 ' + job.companyName + '</span>' : ''}
                                    ${job.location ? '<span>📍 ' + job.location + '</span>' : ''}
                                    ${salaryFmt ? '<span class="salary">💰 ' + salaryFmt + '</span>' : ''}
                                    ${job.jobType ? '<span>⏰ ' + job.jobType.replace(/_/g, ' ') + '</span>' : ''}
                                    ${job.experience ? '<span>🎯 ' + job.experience.replace(/_/g, ' ') + '</span>' : ''}
                                </div>
                            </div>
                            <div class="job-card-actions">
                                <a href="/job-detail.html?id=${job.id}" class="btn btn-primary btn-sm">View Details</a>
                            </div>
                        </div>
                    </div>`;
                }).join('');
                renderPagination();
            } catch (e) {
                document.getElementById('job-list').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Something went wrong</h3><p>' + e.message + '</p></div>';
            }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            let html = '<div class="pagination">';
            html += `<button class="btn btn-outline btn-sm" onclick="goToPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>‹ Prev</button>`;
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline'}" onclick="goToPage(${i})">${i + 1}</button>`;
            }
            html += `<button class="btn btn-outline btn-sm" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages - 1 ? 'disabled' : ''}>Next ›</button>`;
            html += '</div>';
            container.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            loadJobs();
        }

        loadCategories();
        loadJobs();
    </script>
</body>
</html>
