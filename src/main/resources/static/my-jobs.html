<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Jobs — JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <div id="alert"></div>
        <div class="flex-between mb-3">
            <h2 class="page-title" style="margin-bottom:0">📋 My Jobs</h2>
            <a href="/post-job.html" class="btn btn-primary">+ Post New Job</a>
        </div>
        <div id="jobs-list"></div>
        <div id="pagination" class="mt-3"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let currentPage = 0;
        let totalPages = 0;
        const PAGE_SIZE = 10;

        async function loadJobs() {
            showSkeleton('jobs-list', 3);
            try {
                const res = await apiFetch('/jobs/my?page=' + currentPage + '&size=' + PAGE_SIZE);
                totalPages = res.totalPages;
                const jobs = res.content;
                const list = document.getElementById('jobs-list');

                if (jobs.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><h3>No jobs posted yet</h3><p>Post your first job to start receiving applications.</p><a href="/post-job.html" class="btn btn-primary mt-2">Post a Job</a></div>';
                    return;
                }

                list.innerHTML = jobs.map(job => {
                    const statusBadge = job.status === 'OPEN' ? 'badge-success' : 'badge-warning';
                    const count = job.applicantCount || 0;
                    return `
                    <div class="card job-card">
                        <div class="flex-between">
                            <div>
                                <h3>${job.title}</h3>
                                <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.4rem">
                                    ${job.location ? '<span style="font-size:0.84rem;color:var(--text-secondary)">📍 ' + job.location + '</span>' : ''}
                                    <span class="badge ${statusBadge}" style="font-size:0.75rem">${job.status}</span>
                                    ${job.jobType ? '<span class="badge badge-primary">' + job.jobType.replace(/_/g, ' ') + '</span>' : ''}
                                </div>
                            </div>
                            <div style="text-align:right;flex-shrink:0">
                                <div style="font-size:1.5rem;font-weight:700;color:var(--primary)">${count}</div>
                                <div style="font-size:0.78rem;color:var(--text-muted)">applicant${count !== 1 ? 's' : ''}</div>
                            </div>
                        </div>
                        <hr class="section-divider">
                        <div class="flex gap-1" style="margin-top:0.5rem">
                            <a href="/manage-applications.html?jobId=${job.id}" class="btn btn-primary btn-sm">Manage Applications</a>
                            <a href="/job-detail.html?id=${job.id}" class="btn btn-outline btn-sm">View</a>
                        </div>
                    </div>`;
                }).join('');
                renderPagination();
            } catch (e) {
                showAlert(e.message);
            }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = '<div class="pagination">';
            html += '<button class="btn btn-outline btn-sm" onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 0 ? 'disabled' : '') + '>‹ Prev</button>';
            for (let i = 0; i < totalPages; i++) {
                html += '<button class="btn btn-sm ' + (i === currentPage ? 'btn-primary' : 'btn-outline') + '" onclick="goToPage(' + i + ')">' + (i + 1) + '</button>';
            }
            html += '<button class="btn btn-outline btn-sm" onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages - 1 ? 'disabled' : '') + '>Next ›</button>';
            html += '</div>';
            container.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            loadJobs();
        }

        loadJobs();
    </script>
</body>
</html>
