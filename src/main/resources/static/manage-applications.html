<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Applications — JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <a href="/my-jobs.html" class="back-link">← Back to My Jobs</a>
        <div id="alert"></div>

        <div id="header-section">
            <h2 class="page-title">📋 Applications</h2>
        </div>

        <div id="applications-list"></div>
        <div id="pagination" class="mt-3"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let currentPage = 0;
        let totalPages = 0;
        const PAGE_SIZE = 10;
        const params = new URLSearchParams(window.location.search);
        const jobId = params.get('jobId');

        async function loadApplications() {
            if (!jobId) {
                document.getElementById('applications-list').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>No job selected</h3><p>Please select a job to manage applications.</p><a href="/my-jobs.html" class="btn btn-primary mt-2">Go to My Jobs</a></div>';
                return;
            }

            showSkeleton('applications-list', 3);

            try {
                const res = await apiFetch('/applications/job/' + jobId + '?page=' + currentPage + '&size=' + PAGE_SIZE);
                totalPages = res.totalPages;
                const apps = res.content;
                const list = document.getElementById('applications-list');

                document.getElementById('header-section').innerHTML = '<h2 class="page-title">📋 Applications for Job #' + jobId + '</h2><p style="font-size:0.88rem;color:var(--text-muted);margin-top:-1rem;margin-bottom:1.5rem">' + res.totalElements + ' applicant' + (res.totalElements !== 1 ? 's' : '') + '</p>';

                if (apps.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><h3>No applications yet</h3><p>No one has applied for this job yet.</p></div>';
                    return;
                }

                list.innerHTML = apps.map(app => {
                    let badgeClass = 'badge-primary';
                    if (app.status === 'APPLIED') badgeClass = 'badge-info';
                    else if (app.status === 'REVIEWING') badgeClass = 'badge-warning';
                    else if (app.status === 'INTERVIEWED') badgeClass = 'badge-primary';
                    else if (app.status === 'OFFERED') badgeClass = 'badge-success';
                    else if (app.status === 'REJECTED') badgeClass = 'badge-danger';

                    return `
                    <div class="card">
                        <div class="flex-between">
                            <div>
                                <h3>${app.applicantName || 'Applicant #' + app.applicantId}</h3>
                                <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.3rem">
                                    ${app.applicantEmail ? '<span style="font-size:0.84rem;color:var(--text-secondary)">📧 ' + app.applicantEmail + '</span>' : ''}
                                    <span style="font-size:0.84rem;color:var(--text-muted)">Applied ${formatDate(app.appliedAt)}</span>
                                </div>
                            </div>
                            <select class="status-select" data-app-id="${app.id}" data-current="${app.status}" onchange="updateStatus(${app.id}, this)">
                                <option value="APPLIED" ${app.status === 'APPLIED' ? 'selected' : ''}>Applied</option>
                                <option value="REVIEWING" ${app.status === 'REVIEWING' ? 'selected' : ''}>Reviewing</option>
                                <option value="INTERVIEWED" ${app.status === 'INTERVIEWED' ? 'selected' : ''}>Interviewed</option>
                                <option value="OFFERED" ${app.status === 'OFFERED' ? 'selected' : ''}>Offered</option>
                                <option value="REJECTED" ${app.status === 'REJECTED' ? 'selected' : ''}>Rejected</option>
                            </select>
                        </div>
                        ${app.coverLetter ? '<hr class="section-divider"><p style="font-size:0.88rem;color:var(--text-secondary);white-space:pre-wrap"><em>' + app.coverLetter + '</em></p>' : ''}
                        ${app.resumeUrl ? '<hr class="section-divider"><a href="/api/v1/files/resume/' + app.id + '" class="btn btn-outline btn-sm" target="_blank">📄 View Resume</a>' : ''}
                        ${!app.resumeUrl ? '<hr class="section-divider">' : ''}
                        <a href="/conversation.html?userId=${app.applicantId}" class="btn btn-outline btn-sm">💬 Message</a>
                    </div>`;
                }).join('');
                renderPagination();
            } catch (e) { showAlert(e.message); }
        }

        async function updateStatus(id, sel) {
            const newStatus = sel.value;
            try {
                await apiPatch('/applications/' + id + '/status', { status: newStatus });
                showToast('Status updated to ' + newStatus, 'success');
            } catch (e) {
                showAlert(e.message);
                sel.value = sel.dataset.current;
            }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = '<div class="pagination">';
            html += '<button class="btn btn-outline btn-sm" onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 0 ? 'disabled' : '') + '>‹ Prev</button>';
            for (let i = 0; i < totalPages; i++) {
                html += '<button class="btn btn-sm ' + (i === currentPage ? 'btn-primary' : 'btn-outline') + '" onclick="goToPage(' + i + ')">' + (i + 1) + '</button>';
            }
            html += '<button class="btn btn-outline btn-sm" onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages - 1 ? 'disabled' : '') + '>Next ›</button>';
            html += '</div>';
            container.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            loadApplications();
        }

        loadApplications();
    </script>
</body>
</html>
