<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job — JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <a href="/my-jobs.html" class="back-link">← Back to My Jobs</a>
        <div id="alert"></div>
        <div class="card" style="max-width:720px">
            <h2 class="mb-2">📌 Post a New Job</h2>
            <form id="job-form">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="title" placeholder="e.g. Senior Java Developer" required>
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="description" rows="6" placeholder="Describe the role and responsibilities..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Requirements</label>
                    <textarea id="requirements" rows="4" placeholder="List the qualifications and skills needed..."></textarea>
                </div>
                <div class="form-group">
                    <label>Benefits</label>
                    <textarea id="benefits" rows="4" placeholder="Describe the benefits and perks..."></textarea>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <div class="form-group flex-1" style="min-width:200px">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="e.g. Hà Nội">
                    </div>
                    <div class="form-group flex-1" style="min-width:140px">
                        <label>Job Type</label>
                        <select id="jobType">
                            <option value="FULL_TIME">Full Time</option>
                            <option value="PART_TIME">Part Time</option>
                            <option value="REMOTE">Remote</option>
                            <option value="CONTRACT">Contract</option>
                            <option value="INTERNSHIP">Internship</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <div class="form-group flex-1" style="min-width:140px">
                        <label>Experience Level</label>
                        <select id="experience">
                            <option value="ENTRY">Entry</option>
                            <option value="ONE_TWO_YEARS">1-2 Years</option>
                            <option value="THREE_FIVE_YEARS">3-5 Years</option>
                            <option value="FIVE_PLUS">5+ Years</option>
                            <option value="LEAD">Lead</option>
                        </select>
                    </div>
                    <div class="form-group flex-1" style="min-width:140px">
                        <label>Category</label>
                        <select id="categoryId">
                            <option value="">Select category</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <div class="form-group flex-1" style="min-width:140px">
                        <label>Salary Min</label>
                        <input type="number" id="salaryMin" placeholder="e.g. 15000000">
                    </div>
                    <div class="form-group flex-1" style="min-width:140px">
                        <label>Salary Max</label>
                        <input type="number" id="salaryMax" placeholder="e.g. 30000000">
                    </div>
                    <div class="form-group" style="min-width:100px">
                        <label>Currency</label>
                        <select id="currency">
                            <option value="VND">VND</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Application Deadline</label>
                    <input type="date" id="deadline">
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Post Job</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        async function loadCategories() {
            try {
                const cats = await apiFetch('/categories');
                const sel = document.getElementById('categoryId');
                cats.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.name;
                    sel.appendChild(opt);
                });
            } catch (e) { showAlert(e.message); }
        }

        document.getElementById('job-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                requirements: document.getElementById('requirements').value,
                benefits: document.getElementById('benefits').value,
                location: document.getElementById('location').value,
                jobType: document.getElementById('jobType').value,
                experience: document.getElementById('experience').value,
                salaryMin: document.getElementById('salaryMin').value || null,
                salaryMax: document.getElementById('salaryMax').value || null,
                currency: document.getElementById('currency').value,
                deadline: document.getElementById('deadline').value || null,
                categoryId: document.getElementById('categoryId').value || null
            };
            try {
                await apiPost('/jobs', data);
                showToast('Job posted successfully!', 'success');
                setTimeout(() => window.location.href = '/my-jobs.html', 1000);
            } catch (e) { showAlert(e.message); }
        });

        loadCategories();
    </script>
</body>
</html>
