<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JobPortal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <div class="form-card">
            <div class="card">
                <h2 class="text-center mb-2">Create Account</h2>
                <p class="text-center mb-2" style="color:var(--text-secondary);font-size:0.9rem">Join JobPortal today</p>
                <div id="alert"></div>
                <form id="register-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Min. 8 characters" required>
                    </div>
                    <div class="form-group">
                        <label>I am a</label>
                        <select id="role">
                            <option value="APPLICANT">Job Candidate</option>
                            <option value="RECRUITER">Recruiter / Employer</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
                    <p class="text-center mt-2" style="font-size:0.88rem;color:var(--text-secondary)">
                        Already have an account? <a href="/login.html">Sign in</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                const data = await apiFetch('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({
                        fullName: document.getElementById('fullName').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        role: document.getElementById('role').value
                    })
                });
                localStorage.setItem('token', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/index.html';
            } catch (e) {
                showAlert(e.message);
            }
        });
    </script>
</body>
</html>
