server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      fail-on-empty-beans: false

  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

app:
  jwt:
    secret: ${APP_JWT_SECRET:bXktc2VjcmV0LWtleS1mb3Itam9iLXBvcnRhbC1wcm9qZWN0LTI1Ni1iaXQtbG9uZw==}
    access-token-expiry-ms: ${APP_JWT_ACCESS_TOKEN_EXPIRY_MS:3600000}
    refresh-token-expiry-days: ${APP_JWT_REFRESH_TOKEN_EXPIRY_DAYS:7}

  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}
    max-file-size: 5MB
    allowed-types: application/pdf,image/jpeg,image/png

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
