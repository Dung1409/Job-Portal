server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/jobportal?useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: jobuser
    password: jobpass123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      fail-on-empty-beans: false

  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

app:
  jwt:
    secret: "bXktc2VjcmV0LWtleS1mb3Itam9iLXBvcnRhbC1wcm9qZWN0LTI1Ni1iaXQtbG9uZw=="
    access-token-expiry-ms: 3600000
    refresh-token-expiry-days: 7

  upload:
    dir: ./uploads
    max-file-size: 5MB
    allowed-types: application/pdf,image/jpeg,image/png

  cors:
    allowed-origins: http://localhost:8080
